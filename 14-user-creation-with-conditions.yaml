
- name: create user
  hosts: web
  become: yes

  tasks:
    - name: check user is exist or not
      command: id expense
      register: user_info
      ignore_errors: true

    - name: print the information
      debug:
        msg: "user info: {{ user_info }}"

    - name: create user if not exists
      ansible.builtin.user:
        name: expense
        state: present
      when: user_info.rc != 0



