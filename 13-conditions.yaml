- name: check number is less than 10 or not
  hosts: local
  connection: local
  vars_prompt:
  - name: number
    prompt: please enter the number
    private: false
  tasks: 
  - name: print this if less than 10
    ansible.builtin.debug:
      msg: "Given number {{ number }} is less than 10"
    when: number | int < 10 # conditional expression it is | using for number (string) to consider has integer 

  - name: print this if greter than or equal to 10
    ansible.builtin.debug:
      msg: "Given number {{ number }} is greter than or equal to 10"
    when: number | int >= 10