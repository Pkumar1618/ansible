- name: variables to print
  hosts: web

  vars: #play level, all tasks in this play have to access
    COURSE: "DevOps with AWS"
    DURATION: "120HRS"
    TIMINGS: "MOR 12'O CLOCK"
    TRAINER: "SHIVA"

  tasks:
    - name: print the information
      ansible.builtin.debug:
        msg: "Hi I am learning {{ COURSE }}, DURATION is: {{ DURATION }}, TIMINGS is: {{ TIMINGS }}, TRAINER: {{ TRAINER }}"

  tasks:
    - name: print the information
      vars: #task level varibles
        COURSE: "ansible"
      ansible.builtin.debug:
        msg: "Hi I am learning {{ COURSE }}, DURATION is: {{ DURATION }}, TIMINGS is: {{ TIMINGS }}, TRAINER: {{ TRAINER }}"
    
